<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720">
  <defs>
    <radialGradient id="t-bg" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#0e1135"/>
      <stop offset="55%" stop-color="#07091c"/>
      <stop offset="100%" stop-color="#030410"/>
    </radialGradient>
    <radialGradient id="t-glow-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="t-logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="t-btn-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="t-streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t-streak2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="t-glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="t-glow-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="t-glow-xl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="t-dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.1" fill="#6366f1" opacity="0.09"/>
    </pattern>
    <pattern id="t-grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60,0 L0,0 L0,60" fill="none" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="720" height="720" fill="url(#t-bg)"/>
  <rect width="720" height="720" fill="url(#t-dots)"/>
  <rect width="720" height="720" fill="url(#t-grid)"/>

  <!-- Ambient orbs -->
  <ellipse cx="360" cy="300" rx="480" ry="380" fill="url(#t-glow-c)"/>
  <ellipse cx="500" cy="500" rx="280" ry="220" fill="url(#t-glow2)"/>

  <!-- Light streaks -->
  <rect x="0" y="220" width="720" height="1.5" fill="url(#t-streak)"  opacity="0.9"/>
  <rect x="0" y="480" width="720" height="1"   fill="url(#t-streak2)" opacity="0.6"/>
  <rect x="0" y="340" width="720" height="1"   fill="url(#t-streak)"  opacity="0.4"/>

  <!-- Outer decorative ring -->
  <circle cx="360" cy="310" r="190" fill="none" stroke="url(#t-ring)" stroke-width="1" stroke-dasharray="4,8" opacity="0.4"/>
  <circle cx="360" cy="310" r="230" fill="none" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.10"/>

  <!-- Center logo mark — large, glowing -->
  <g filter="url(#t-glow-xl)">
    <rect x="304" y="254" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.22"/>
    <rect x="358" y="254" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.12"/>
    <rect x="304" y="308" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.10"/>
    <rect x="358" y="308" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.05"/>
  </g>
  <g filter="url(#t-glow-md)">
    <rect x="304" y="254" width="48" height="48" rx="12" fill="#6366f1"/>
    <rect x="358" y="254" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.55"/>
    <rect x="304" y="308" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.28"/>
    <rect x="358" y="308" width="48" height="48" rx="12" fill="#6366f1" fill-opacity="0.12"/>
  </g>

  <!-- Brand name -->
  <text x="360" y="406" fill="url(#t-logo-g)" font-family="system-ui,sans-serif" font-size="72" font-weight="800" letter-spacing="-0.04em" text-anchor="middle" filter="url(#t-glow-sm)">FlowMind</text>

  <!-- Divider line -->
  <line x1="220" y1="432" x2="500" y2="432" stroke="#6366f1" stroke-width="1" stroke-opacity="0.20"/>

  <!-- Sub tagline -->
  <text x="360" y="466" fill="#64748b" font-family="system-ui,sans-serif" font-size="18" font-weight="500" text-anchor="middle" letter-spacing="0.04em">AI SaaS TEMPLATE</text>

  <!-- Pill badge -->
  <rect x="264" y="492" width="192" height="36" rx="18" fill="url(#t-btn-g)" fill-opacity="0.12"/>
  <rect x="264" y="492" width="192" height="36" rx="18" fill="none" stroke="url(#t-btn-g)" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="290" cy="510" r="4" fill="#10b981"/>
  <text x="360" y="515" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="0.02em">Launch in Days</text>

  <!-- Bottom micro stats -->
  <text x="204" y="572" fill="#2a3550" font-family="system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">847K</text>
  <text x="204" y="586" fill="#1a2240" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Workflows</text>

  <text x="360" y="572" fill="#2a3550" font-family="system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">94.8%</text>
  <text x="360" y="586" fill="#1a2240" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Accuracy</text>

  <text x="516" y="572" fill="#2a3550" font-family="system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">20+</text>
  <text x="516" y="586" fill="#1a2240" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Pages</text>

  <!-- Stat dividers -->
  <line x1="282" y1="566" x2="282" y2="588" stroke="#1a2240" stroke-width="1"/>
  <line x1="438" y1="566" x2="438" y2="588" stroke="#1a2240" stroke-width="1"/>

  <!-- domain footer -->
  <text x="360" y="650" fill="#1a2240" font-family="'SF Mono',monospace" font-size="12" text-anchor="middle">tryflowmind.com</text>

  <!-- Corner accents -->
  <g filter="url(#t-glow-sm)" opacity="0.45">
    <line x1="0"   y1="0"   x2="60"  y2="0"   stroke="#6366f1" stroke-width="2"/>
    <line x1="0"   y1="0"   x2="0"   y2="60"  stroke="#6366f1" stroke-width="2"/>
    <line x1="720" y1="720" x2="660" y2="720" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="720" y1="720" x2="720" y2="660" stroke="#8b5cf6" stroke-width="2"/>
  </g>
</svg>
