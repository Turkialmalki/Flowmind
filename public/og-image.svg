<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Headline gradient (indigo → lavender) matching --grad -->
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e7cff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- CTA button gradient matching --grad2 -->
    <linearGradient id="btn-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#8e7cff"/>
    </linearGradient>
    <!-- Chart fill: rgba(91,91,214,0.14) → 0 -->
    <linearGradient id="ch-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b5bd6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5b5bd6" stop-opacity="0"/>
    </linearGradient>
    <!-- Panel top glow accent line -->
    <linearGradient id="panel-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5b5bd6" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#5b5bd6" stop-opacity="0.80"/>
      <stop offset="68%"  stop-color="#8e7cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8e7cff" stop-opacity="0"/>
    </linearGradient>
    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(15,23,42,0.045)"/>
    </pattern>
    <!-- Panel glow shadow -->
    <filter id="panel-sh" x="-12%" y="-8%" width="136%" height="136%">
      <feDropShadow dx="0" dy="48" stdDeviation="40" flood-color="#0f172a" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5b5bd6" flood-opacity="0.14"/>
    </filter>
    <!-- Card shadow -->
    <filter id="card-sh" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4"  flood-color="#5b5bd6" flood-opacity="0.10"/>
    </filter>
    <!-- Dot glow -->
    <filter id="dot-g" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Panel clip -->
    <clipPath id="pc"><rect x="556" y="0" width="692" height="760" rx="20"/></clipPath>
  </defs>

  <!-- ═══ BACKGROUND — matches hero-bg-image CSS exactly ═══ -->
  <rect width="1280" height="720" fill="#0a0b26"/>
  <!-- Purple glow upper-left (108,92,231 = #6c5ce7) -->
  <ellipse cx="230" cy="158" rx="500" ry="430" fill="rgba(108,92,231,0.28)"/>
  <!-- Lavender glow upper-right (#7c4dff) -->
  <ellipse cx="1050" cy="130" rx="420" ry="360" fill="rgba(124,77,255,0.18)"/>
  <!-- Secondary bloom center -->
  <ellipse cx="820"  cy="230" rx="330" ry="260" fill="rgba(142,124,255,0.12)"/>
  <!-- Bottom depth vignette -->
  <ellipse cx="640"  cy="820" rx="720" ry="280" fill="rgba(4,6,18,0.72)"/>
  <!-- Dot grid (matches .hg from hero CSS) -->
  <rect width="1280" height="720" fill="url(#dots)"/>

  <!-- ═══ LEFT COPY ═══ -->

  <!-- Logo mark 2×2 — matches hero nav logo squares -->
  <rect x="56" y="56" width="16" height="16" rx="4"  fill="#5b5bd6"/>
  <rect x="76" y="56" width="16" height="16" rx="4"  fill="#5b5bd6" fill-opacity="0.50"/>
  <rect x="56" y="76" width="16" height="16" rx="4"  fill="#5b5bd6" fill-opacity="0.24"/>
  <rect x="76" y="76" width="16" height="16" rx="4"  fill="#5b5bd6" fill-opacity="0.09"/>
  <text x="106" y="73" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="19" font-weight="800" letter-spacing="-0.03em">FlowMind</text>

  <!-- h1 line 1 — white, matches hero -->
  <text x="56" y="202" fill="#ffffff" font-family="system-ui,sans-serif" font-size="52" font-weight="800" letter-spacing="-0.04em">AI Automation SaaS</text>
  <!-- h1 line 2 — gradient, 0.60em of line 1 = 31px, matches hero CSS -->
  <text x="56" y="248" fill="url(#hg)" font-family="system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="-0.02em">Ready to Launch</text>

  <!-- Subtext — matches .hsub from hero -->
  <text x="56" y="294" fill="rgba(255,255,255,0.60)" font-family="system-ui,sans-serif" font-size="16" font-weight="400" letter-spacing="-0.01em">Build and ship automation workflows,</text>
  <text x="56" y="318" fill="rgba(255,255,255,0.60)" font-family="system-ui,sans-serif" font-size="16" font-weight="400" letter-spacing="-0.01em">integrations, and AI-powered tools.</text>

  <!-- CTA button — matches .btn-g.btn-xl -->
  <rect x="56" y="348" width="182" height="48" rx="24" fill="url(#btn-g)"/>
  <text x="147" y="378" fill="#ffffff" font-family="system-ui,sans-serif" font-size="15" font-weight="700" letter-spacing="-0.01em" text-anchor="middle">Get Template  →</text>

  <!-- Urgency copy — matches .h-urgency-copy -->
  <text x="56" y="422" fill="rgba(255,255,255,0.45)" font-family="system-ui,sans-serif" font-size="12" font-weight="400">No design. No setup. Just launch.</text>

  <!-- Trust row — avatar circles + label -->
  <circle cx="72"  cy="460" r="15" fill="#6c5ce7" fill-opacity="0.55" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <circle cx="90"  cy="460" r="15" fill="#5b5bd6" fill-opacity="0.60" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <circle cx="108" cy="460" r="15" fill="#7c4dff" fill-opacity="0.50" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <circle cx="126" cy="460" r="15" fill="#5b5bd6" fill-opacity="0.55" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <circle cx="144" cy="460" r="15" fill="#8e7cff" fill-opacity="0.50" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <text x="72"  y="465" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">S</text>
  <text x="90"  y="465" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">O</text>
  <text x="108" y="465" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">L</text>
  <text x="126" y="465" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">J</text>
  <text x="144" y="465" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">P</text>
  <text x="165" y="465" fill="rgba(255,255,255,0.68)" font-family="system-ui,sans-serif" font-size="12" font-weight="400">Used by <tspan font-weight="700" fill="rgba(255,255,255,0.90)">100+</tspan> AI founders</text>

  <!-- ═══ PREMIUM FLOATING CARD — matches .hero-premium-card ═══ -->
  <g filter="url(#card-sh)">
    <rect x="498" y="26" width="178" height="160" rx="14" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.80)" stroke-width="1.5"/>
    <!-- Card header: icon + label + live dot -->
    <rect x="512" y="42" width="20" height="20" rx="6" fill="rgba(91,91,214,0.08)"/>
    <text x="522" y="56" fill="#5b5bd6" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">⚡</text>
    <text x="538" y="56" fill="#334155" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600">AI Insights</text>
    <circle cx="665" cy="52" r="3.5" fill="#10b981"/>
    <!-- Metric: 94.8% -->
    <text x="512" y="96" fill="#0f172a" font-family="system-ui,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.03em">94.8%</text>
    <text x="512" y="112" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" font-weight="500">Automation Accuracy</text>
    <!-- Sparkline — matches hpc-spark paths -->
    <path d="M512,150 C526,146 540,148 554,139 C568,130 580,131 594,124 L624,118 L624,152 Z" fill="rgba(91,91,214,0.10)"/>
    <polyline points="512,150 526,146 540,148 554,139 568,130 580,131 594,124 624,118" stroke="#5b5bd6" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Footer -->
    <line x1="512" y1="158" x2="662" y2="158" stroke="rgba(15,23,42,0.07)" stroke-width="1"/>
    <circle cx="518" cy="167" r="3" fill="#10b981"/>
    <text x="526" y="171" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" font-weight="500">1,240 requests today</text>
  </g>

  <!-- ═══ DASHBOARD PANEL (WHITE — matches .dw) ═══ -->
  <g filter="url(#panel-sh)">

    <g clip-path="url(#pc)">
      <!-- White panel body — matches .dw background: #fff -->
      <rect x="556" y="0" width="692" height="760" fill="#ffffff"/>

      <!-- Browser chrome — matches .db background: var(--bg2) = #f1f5f9 -->
      <rect x="556" y="0" width="692" height="40" fill="#f1f5f9"/>
      <line x1="556" y1="40" x2="1248" y2="40" stroke="rgba(15,23,42,0.07)" stroke-width="1"/>
      <!-- Traffic lights — matches .dd div colors -->
      <circle cx="578" cy="20" r="5" fill="#ff5f57"/>
      <circle cx="596" cy="20" r="5" fill="#febc2e"/>
      <circle cx="614" cy="20" r="5" fill="#28c840"/>
      <!-- URL bar — matches .du -->
      <rect x="706" y="10" width="240" height="20" rx="10" fill="#e8edf5"/>
      <text x="826" y="24" fill="#94a3b8" font-family="monospace" font-size="9.5" text-anchor="middle">your-ai-startup.com/dashboard</text>

      <!-- Page header -->
      <text x="576" y="66" fill="#0f172a" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Overview</text>
      <text x="576" y="83" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Your automation workspace</text>
      <line x1="556" y1="96" x2="1248" y2="96" stroke="rgba(15,23,42,0.07)" stroke-width="1"/>

      <!-- ── STAT CARDS (3 columns) — matches .ds ── -->
      <!-- Card 1: Workflows Run -->
      <rect x="572" y="108" width="210" height="86" rx="10" fill="#f1f5f9" stroke="rgba(15,23,42,0.07)" stroke-width="1.5"/>
      <text x="588" y="127" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.08em">WORKFLOWS RUN</text>
      <text x="588" y="163" fill="#0f172a" font-family="system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-0.03em">847K</text>
      <text x="588" y="181" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="600">↑ 23% this week</text>

      <!-- Card 2: Automation Rate -->
      <rect x="794" y="108" width="210" height="86" rx="10" fill="#f1f5f9" stroke="rgba(15,23,42,0.07)" stroke-width="1.5"/>
      <text x="810" y="127" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.08em">AUTOMATION RATE</text>
      <text x="810" y="163" fill="#0f172a" font-family="system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-0.03em">94.2%</text>
      <text x="810" y="181" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="600">↑ 3.1% vs last week</text>

      <!-- Card 3: AI Tasks -->
      <rect x="1016" y="108" width="216" height="86" rx="10" fill="#f1f5f9" stroke="rgba(15,23,42,0.07)" stroke-width="1.5"/>
      <text x="1032" y="127" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.08em">AI TASKS</text>
      <text x="1032" y="163" fill="#0f172a" font-family="system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-0.03em">1.2M</text>
      <text x="1032" y="181" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="600">↑ 3.4K today</text>

      <!-- ── CHART CARD — matches .dch ── -->
      <rect x="572" y="206" width="660" height="202" rx="10" fill="#f1f5f9" stroke="rgba(15,23,42,0.07)" stroke-width="1.5"/>

      <!-- Chart header: title + period tabs -->
      <text x="588" y="228" fill="#0f172a" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Automation Runs</text>
      <!-- Period tabs — matches .dtb buttons -->
      <rect x="1108" y="216" width="32" height="18" rx="9" fill="#e8edf5"/>
      <text x="1124" y="229" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">24h</text>
      <rect x="1146" y="216" width="32" height="18" rx="9" fill="#e8edf5"/>
      <text x="1162" y="229" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">7d</text>
      <rect x="1184" y="216" width="36" height="18" rx="9" fill="#5b5bd6"/>
      <text x="1202" y="229" fill="#ffffff" font-family="system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">30d</text>

      <!-- Chart grid lines — matches .dch svg lines stroke="rgba(15,23,42,.05)" -->
      <line x1="572" y1="252" x2="1232" y2="252" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
      <line x1="572" y1="284" x2="1232" y2="284" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
      <line x1="572" y1="316" x2="1232" y2="316" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
      <line x1="572" y1="348" x2="1232" y2="348" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>

      <!-- Chart sparkline — matches 30d path from PERIOD_DATA -->
      <!-- Shadow/glow -->
      <path d="M580,388 C640,374 710,356 800,336 C882,318 952,296 1040,272 C1106,254 1162,244 1224,234" fill="none" stroke="#5b5bd6" stroke-width="9" stroke-opacity="0.09" stroke-linecap="round"/>
      <!-- Main stroke -->
      <path d="M580,388 C640,374 710,356 800,336 C882,318 952,296 1040,272 C1106,254 1162,244 1224,234" fill="none" stroke="#5b5bd6" stroke-width="2" stroke-linecap="round"/>
      <!-- Fill area -->
      <path d="M580,388 C640,374 710,356 800,336 C882,318 952,296 1040,272 C1106,254 1162,244 1224,234 L1224,400 L580,400 Z" fill="url(#ch-fill)"/>
      <!-- Endpoint dot — matches circle in hero SVG: fill="#5B5BD6" stroke="white" -->
      <circle cx="1224" cy="234" r="8"   fill="rgba(91,91,214,0.14)"/>
      <circle cx="1224" cy="234" r="4"   fill="#5b5bd6" stroke="#f1f5f9" stroke-width="2" filter="url(#dot-g)"/>

      <!-- ── WORKFLOW ROW — matches .hwf card preview ── -->
      <rect x="572" y="420" width="660" height="76" rx="10" fill="#f1f5f9" stroke="rgba(15,23,42,0.07)" stroke-width="1.5"/>
      <!-- Live dot + title -->
      <circle cx="590" cy="440" r="4" fill="#10b981"/>
      <text x="600" y="444" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700">Calendar Automation</text>
      <!-- LIVE badge -->
      <rect x="1154" y="430" width="48" height="18" rx="9" fill="rgba(5,150,105,0.08)" stroke="rgba(5,150,105,0.30)" stroke-width="1"/>
      <text x="1178" y="443" fill="#059669" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" text-anchor="middle">LIVE</text>
      <!-- Pipeline nodes — matches .hwf-nodes -->
      <rect x="582" y="454" width="80" height="22" rx="11" fill="#e8edf5" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
      <text x="622" y="469" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="500" text-anchor="middle">New Meeting</text>
      <text x="667" y="469" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">→</text>
      <rect x="676" y="454" width="62" height="22" rx="11" fill="#5b5bd6"/>
      <text x="707" y="469" fill="#ffffff" font-family="system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">AI Checks</text>
      <text x="743" y="469" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">→</text>
      <rect x="752" y="452" width="64" height="26" rx="13" fill="rgba(91,91,214,0.08)" stroke="#5b5bd6" stroke-width="1.5"/>
      <text x="784" y="469" fill="#5b5bd6" font-family="system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">Sync Cal</text>
      <text x="821" y="469" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">→</text>
      <rect x="830" y="454" width="78" height="22" rx="11" fill="#e8edf5" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
      <text x="869" y="469" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="500" text-anchor="middle">Notify Slack</text>
      <!-- Status line -->
      <circle cx="586" cy="483" r="3" fill="#5b5bd6"/>
      <text x="594" y="487" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Running now · step 3 of 4</text>

    </g>

    <!-- Panel border — matches .dw border: 1.5px solid rgba(15,23,42,0.13) -->
    <rect x="556" y="0" width="692" height="760" rx="20" fill="none" stroke="rgba(15,23,42,0.13)" stroke-width="1.5"/>
    <!-- Subtle top glow accent (unique to OG image — adds premium feel) -->
    <rect x="556" y="0" width="692" height="2" rx="1" fill="url(#panel-top)"/>

  </g>

  <!-- Corner accents -->
  <line x1="0"    y1="0"   x2="64"   y2="0"   stroke="#5b5bd6" stroke-width="1.5" stroke-opacity="0.22"/>
  <line x1="0"    y1="0"   x2="0"    y2="64"  stroke="#5b5bd6" stroke-width="1.5" stroke-opacity="0.22"/>
  <line x1="1280" y1="720" x2="1216" y2="720" stroke="#8e7cff" stroke-width="1.5" stroke-opacity="0.22"/>
  <line x1="1280" y1="720" x2="1280" y2="656" stroke="#8e7cff" stroke-width="1.5" stroke-opacity="0.22"/>
</svg>
